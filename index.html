<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>level 2</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Başlık ve UI */
        #main-title { font-size: 18px; margin-bottom: 20px; }
        .ui-box { display: block; margin-bottom: 20px; }
        
        input {
            padding: 10px;
            background: black;
            color: red;
            border: 1px solid red;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: red;
            color: black;
            border: none;
            cursor: pointer;
        }

        /* Görsel Alanı */
        #imageContainer {
            position: relative;
            display: none;
            max-width: 90%;
        }

        #secretImage {
            max-width: 100%;
            height: auto;
            opacity: 0;
            transition: opacity 2s, filter 3s;
        }

        /* Sağ alttaki gizli referans yazısı */
        #hint-trigger {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: rgba(255, 0, 0, 0.3);
            cursor: pointer;
            user-select: none;
        }

        /* Kirlenmiş görsel efekti */
        .corrupted {
            filter: grayscale(100%) contrast(200%) brightness(50%) blur(2px);
        }
    </style>
</head>
<body>

    <h1 id="main-title">W̵h̸y̵?</h1>

    <div id="ui-1" class="ui-box">
        <input type="text" id="ans1" placeholder="...">
        <button onclick="check1()">ENTER</button>
    </div>

    <div id="ui-2" class="ui-box" style="display: none;">
        <input type="text" id="ans2" placeholder="song code?">
        <button onclick="check2()">SUBMIT</button>
    </div>

    <div id="imageContainer">
        <img id="secretImage" src="Screenshot_20260413_210926_Instagram.jpg">
        <div id="hint-trigger" onclick="showLevel2()">saddest little baby in the room</div>
    </div>

    <script>
        const img = document.getElementById("secretImage");
        const title = document.getElementById("main-title");

        // 1. Şifre Kontrolü
        function check1() {
            const val = document.getElementById("ans1").value;
            if (val === "3874453316965168901") {
                document.getElementById("ui-1").style.display = "none";
                document.getElementById("imageContainer").style.display = "block";
                setTimeout(() => { img.style.opacity = "1"; }, 50);
            } else { alert("wrong."); }
        }

        // Gizli yazıyı tıklayınca 2. seviye kutusunu aç
        function showLevel2() {
            document.getElementById("ui-2").style.display = "block";
            document.getElementById("hint-trigger").style.display = "none";
        }

        // 2. Şifre Kontrolü (Oh Klahoma)
        function check2() {
            const val = document.getElementById("ans2").value;
            // YouTube linkindeki sayısal/kod kısım: vAtbaZJC8h8
            if (val.toLowerCase() === "vatbazjc8h8") {
                document.getElementById("ui-2").style.display = "none";
                
                // Başlığı değiştir
                title.innerHTML = "S̸̷̵̖̹̟̖̜̫̬S̸A̠ͭ̽D̴_̴̛̲_̴̬Ḑ̸Ȩ̼_̬S̝Ţ̵ O̴N̵E̴";
                title.style.fontSize = "24px";

                // Görseli kirlet
                img.classList.add("corrupted");
                
                // Ekstra korkutucu efekt: Ekranı titret
                document.body.style.animation = "glitch 0.1s infinite";
            } else {
                alert("not the right song.");
            }
        }
    </script>

    <style>
        @keyframes glitch {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(0, 0); }
        }
    </style>

</body>
</html>
