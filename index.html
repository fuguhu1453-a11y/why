<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>why</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Başlık stili */
        #main-title {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* İnput ve Butonun olduğu alan */
        #game-ui {
            display: block;
        }

        input {
            padding: 10px;
            background: black;
            color: red;
            border: 1px solid red;
            outline: none;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: red;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Gizli Görsel */
        #secretImage {
            display: none;
            max-width: 90%;
            max-height: 80vh;
            opacity: 0;
            transition: opacity 2s ease-in;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1 id="main-title">
        Ẃ̵̢͎ͬͪ̆͠͝_̵̸̘̪̝̳͖̬͚̫ͥͥ̽͆͌͒ͭ̂͛͊̚<br>
        d̸̡̨̛͍̥̜͍̪͓̰̤̙̖͉͚͗͛<br>
        y̨̨̛͚̣̥͈̫̰͍̤̺͆͌<br>
        l̡͖̼̇̒<br>
        m̷̛͕̤͇ͯ<br>
        a̷̦̣̙ͮalő͗́͒ņ͎e?
    </h1>

    <div id="game-ui">
        <input type="text" id="answer" placeholder="...">
        <button onclick="check()">ENTER</button>
    </div>

    <img id="secretImage" src="Screenshot_20260413_210926_Instagram.jpg">

    <script>
        function check() {
            const inputVal = document.getElementById("answer").value;
            const ui = document.getElementById("game-ui");
            const img = document.getElementById("secretImage");
            const title = document.getElementById("main-title");

            if (inputVal === "3874453316965168901") {
                // Giriş alanını yok et
                ui.style.display = "none";
                
                // Başlığı değiştir
                title.innerHTML = "f o u n d";

                // Resmi göster
                img.style.display = "block";
                setTimeout(() => {
                    img.style.opacity = "1";
                }, 50);
            } else {
                alert("wrong.");
            }
        }
    </script>

</body>
</html>
